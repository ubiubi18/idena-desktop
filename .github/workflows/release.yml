name: Release

on:
  push:
    tags:
      - v*
  workflow_dispatch:
    inputs:
      tag:
        description: Semver tag to release, for example v1.2.3
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            electron_builder_args: --mac --publish always
          - os: ubuntu-latest
            electron_builder_args: --linux --publish always
          - os: windows-latest
            electron_builder_args: --win --publish always
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Set tag
        id: refs
        env:
          RELEASE_REF_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          tag="${RELEASE_REF_NAME#refs/tags/}"
          if [[ ! "${tag}" =~ ^v?[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z][0-9A-Za-z.-]*)?$ ]]; then
            echo "Unsupported release tag: ${tag}" >&2
            exit 1
          fi
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: 24.18.0
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Verify source mirror clone
        run: npm run setup:sources -- --target-root .tmp/source-mirror-check

      - name: Prepare source mirrors
        run: npm run setup:sources

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: 1.26.5

      - name: Run release check
        run: npm run release:check

      - name: Run unit tests
        run: npm test -- --runInBand

      - name: Prepare bundled node
        run: npm run prepare:node

      - name: Bump version
        env:
          RELEASE_TAG: ${{ steps.refs.outputs.tag }}
        run: npm --no-git-tag-version version --allow-same-version "${RELEASE_TAG}"
        shell: bash

      - name: Build renderer
        run: npm run build

      - name: Build & release
        env:
          ELECTRON_BUILDER_ARGS: ${{ matrix.electron_builder_args }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          read -r -a electron_builder_args <<< "${ELECTRON_BUILDER_ARGS}"
          node scripts/run-electron-builder.js "${electron_builder_args[@]}"
        shell: bash
