name: Release

on:
  push:
    tags:
      - v*
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            electron_builder_args: --mac --publish always
          - os: ubuntu-latest
            electron_builder_args: --linux --publish always
          - os: windows-latest
            electron_builder_args: --win --publish always
    steps:
      - name: Check out
        uses: actions/checkout@v6

      - name: Set tag
        id: refs
        run: echo "tag=${GITHUB_REF#refs/*/}" >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.15.0
          cache: npm

      - name: Install Linux canvas deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev

      - name: Install Windows canvas deps
        if: matrix.os == 'windows-latest'
        run: |
          choco install -y gtk-runtime libjpeg-turbo 7zip curl visualstudio2019-workload-vctools mingw
          "C:\ProgramData\chocolatey\lib\mingw\tools\install\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          # npm config set msvs_version 2019
          curl -LO http://ftp.gnome.org/pub/GNOME/binaries/win64/gtk+/2.22/gtk+-bundle_2.22.1-20101229_win64.zip
          7z x gtk+-bundle_2.22.1-20101229_win64.zip -y -oC:\GTK

      - name: Install macOS canvas deps
        if: matrix.os == 'macos-latest'
        run: brew install pkg-config cairo pango libpng jpeg giflib librsvg

      - name: Install macOS node build toolchain
        if: matrix.os == 'macos-latest'
        run: |
          if ! command -v go >/dev/null 2>&1; then
            brew install go
          fi
          if ! command -v rustup >/dev/null 2>&1; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal
            echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
            export PATH="$HOME/.cargo/bin:$PATH"
          fi
          rustup target add aarch64-apple-darwin
          go version
          rustc --version

      - name: Install deps
        run: npm ci

      - name: Verify source mirror clone
        run: npm run setup:sources -- --target-root .tmp/source-mirror-check

      - name: Prepare source mirrors
        run: npm run setup:sources

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.19.13

      - name: Run release check
        run: npm run release:check

      - name: Bump version
        run: npm --no-git-tag-version version --allow-same-version ${{ steps.refs.outputs.tag }}

      - name: Build renderer
        run: npm run build

      - name: Build & release
        run: node scripts/run-electron-builder.js ${{ matrix.electron_builder_args }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
